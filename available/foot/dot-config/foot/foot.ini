# ~/.config/foot/foot.ini

[main]
font=BlexMono Nerd Font:size=8
font-bold=BlexMono Nerd Font:style=Bold:size=8
font-italic=BlexMono Nerd Font:style=Italic:size=8

dpi-aware=yes
pad=8x8

[environment]
TERM=xterm-256color
COLORTERM=truecolor

[scrollback]
lines=10000

[mouse]
hide-when-typing=yes

[colors-dark]
alpha=0.95

# Kanagawa-ish palette (идеально под LazyVim)
foreground=dcd7ba
background=1f1f28

regular0=16161d
regular1=c34043
regular2=76946a
regular3=c0a36e
regular4=7e9cd8
regular5=957fb8
regular6=6a9589
regular7=c8c093

bright0=727169
bright1=e82424
bright2=98bb6c
bright3=e6c384
bright4=7fb4ca
bright5=938aa9
bright6=7aa89f
bright7=dcd7ba

selection-foreground=1f1f28
selection-background=2d4f67

[key-bindings]
clipboard-copy=Control+Shift+c
clipboard-paste=Control+Shift+v

scrollback-up-page=Shift+Page_Up
scrollback-down-page=Shift+Page_Down

search-start=Control+Shift+f

[bell]
urgent=no
notify=no
visual=no
